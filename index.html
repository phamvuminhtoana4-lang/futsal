<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Element Wars: Final Fusion</title>
    <style>
        :root {
            --bg: #05050a; --panel: #16213e; --accent: #e94560;
            --fire: #ff4757; --water: #2e86de; --earth: #2ed573; --thunder: #f1c40f;
            --wind: #48dbfb; --dark: #5f27cd; --light: #f7f1e3;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        /* HUD */
        .hud { display: flex; width: 100%; background: var(--panel); padding: 15px; justify-content: space-around; border-bottom: 3px solid var(--accent); z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .stat { font-size: 1.1rem; font-weight: bold; text-transform: uppercase; }
        .gold-txt { color: #f1c40f; } .hp-txt { color: #ff4757; }

        /* Main Layout */
        .main-container { display: flex; gap: 20px; padding: 20px; width: 1200px; justify-content: center; align-items: flex-start; }
        
        /* Synergy Panel */
        .synergy-list { width: 200px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; font-size: 0.8rem; }
        .syn-item { margin-bottom: 8px; opacity: 0.3; transition: 0.3s; padding: 4px; border-radius: 4px; }
        .syn-active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 3px solid var(--thunder); }

        /* Board */
        .board { display: grid; grid-template-columns: repeat(7, 80px); grid-template-rows: repeat(6, 80px); gap: 6px; background: #0f3460; padding: 12px; border-radius: 12px; border: 4px solid #1a1a2e; position: relative; }
        .cell { width: 80px; height: 80px; background: rgba(255,255,255,0.02); border-radius: 8px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.enemy-zone { background: rgba(233, 69, 96, 0.05); }
        .cell.highlight { background: rgba(255, 255, 255, 0.1); }

        /* Unit & Bars */
        .unit { width: 70px; height: 70px; border-radius: 10px; position: absolute; cursor: grab; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid rgba(255,255,255,0.2); transition: transform 0.2s, top 0.4s, left 0.4s; }
        .unit.ult-ready { animation: pulse-gold 0.8s infinite; border-color: gold; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0px gold; } 50% { box-shadow: 0 0 15px gold; } 100% { box-shadow: 0 0 0px gold; } }

        .hp-bar { width: 85%; height: 5px; background: #333; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .mp-bar { width: 85%; height: 3px; background: #333; margin-top: 2px; border-radius: 2px; }
        .mp-fill { height: 100%; background: #a29bfe; width: 0%; transition: width 0.3s; }
        .unit-star { color: gold; position: absolute; top: 1px; font-size: 11px; }
        .items-icons { position: absolute; bottom: 12px; font-size: 10px; }

        /* VFX */
        .vfx-text { position: absolute; font-weight: bold; pointer-events: none; animation: float-up 0.8s forwards; z-index: 100; font-size: 14px; }
        @keyframes float-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-40px); opacity: 0; } }

        /* Types */
        .fire { background: var(--fire); } .water { background: var(--water); } .earth { background: var(--earth); }
        .thunder { background: var(--thunder); color: #000; } .wind { background: var(--wind); } 
        .dark { background: var(--dark); } .light { background: var(--light); color: #333; }

        /* Shop Area */
        .shop-area { display: flex; flex-direction: column; gap: 10px; }
        .shop { display: flex; gap: 10px; background: var(--panel); padding: 15px; border-radius: 12px; border: 2px solid #333; }
        .shop-slot { width: 105px; height: 140px; background: #0f3460; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; text-align: center; }
        .shop-slot:hover { border-color: var(--accent); transform: translateY(-3px); }
        .shop-slot.empty { background: rgba(0,0,0,0.4); border: 1px dashed #444; pointer-events: none; opacity: 0.2; }
        .price { color: #f1c40f; font-weight: bold; margin-top: 8px; }

        /* Controls */
        .sell-zone { width: 100%; height: 40px; background: rgba(233, 69, 96, 0.1); border: 2px dashed var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); font-size: 0.9rem; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-roll { background: #533483; } .btn-exp { background: #341f97; } .btn-fight { background: var(--accent); font-size: 1.1rem; box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #msg-log { height: 25px; color: #f1c40f; font-weight: bold; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="hud">
    <div class="stat gold-txt">💰 Vàng: <span id="gold">20</span>G</div>
    <div class="stat hp-txt">❤️ Máu: <span id="hp">100</span></div>
    <div class="stat">⭐ Cấp: <span id="lvl">1</span> (<span id="pop">0</span>/<span id="max-pop">1</span>)</div>
    <div class="stat">⚔️ Vòng: <span id="round">1</span></div>
</div>

<div class="main-container">
    <div class="synergy-list" id="synergies"></div>

    <div id="game-center">
        <div id="msg-log">Sắp xếp đội hình và chiến đấu!</div>
        <div class="board" id="board"></div>
        
        <div class="shop-area">
            <div class="shop" id="shop"></div>
            <div style="display:flex; gap:10px;">
                <div class="sell-zone" id="sell-zone">KÉO VÀO ĐÂY ĐỂ BÁN (2G)</div>
                <div class="sell-zone" id="item-zone" style="color: #48dbfb; border-color: #48dbfb; background: rgba(72, 219, 251, 0.1);">KHO ĐỒ: <span id="inventory-count">0</span></div>
            </div>
            <div style="display:flex; gap:10px; justify-content: center;">
                <button class="btn btn-exp" onclick="buyExp()">LÊN CẤP (4G)</button>
                <button class="btn btn-roll" onclick="rollShop()">LÀM MỚI (2G)</button>
                <button class="btn btn-fight" id="fight-btn" onclick="startCombat()">XUẤT QUÂN!</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        TYPES: {
            fire: { n: 'Hỏa', c: 'fire', hp: 120, atk: 45, mpM: 100, s: 'Bộc Phá' },
            water: { n: 'Thủy', c: 'water', hp: 200, atk: 20, mpM: 80, s: 'Hồi Xuân' },
            earth: { n: 'Thổ', c: 'earth', hp: 380, atk: 15, mpM: 120, s: 'Thạch Giáp' },
            thunder: { n: 'Lôi', c: 'thunder', hp: 110, atk: 35, mpM: 70, s: 'Tê Liệt' },
            wind: { n: 'Phong', c: 'wind', hp: 140, atk: 25, mpM: 90, s: 'Ảnh Tử' },
            dark: { n: 'Ám', c: 'dark', hp: 150, atk: 35, mpM: 100, s: 'Ma Hút' },
            light: { n: 'Quang', c: 'light', hp: 130, atk: 22, mpM: 140, s: 'Thánh Quang' }
        },
        SYNERGIES: {
            fire: { req: 3, b: 'Toàn đội +40% Công' },
            water: { req: 3, b: 'Hồi 10% HP mỗi turn' },
            earth: { req: 3, b: 'Giảm 30% sát thương nhận' },
            thunder: { req: 2, b: 'Tăng 50% Mana khởi đầu' }
        },
        ITEMS: [
            { n: 'Kiếm', atk: 20, hp: 0, i: '⚔️' },
            { n: 'Giáp', atk: 0, hp: 150, i: '🛡️' },
            { n: 'Trượng', atk: 10, hp: 50, i: '🪄' }
        ]
    };

    let G = {
        gold: 20, hp: 100, round: 1, lvl: 1, exp: 0,
        units: [], enemies: [], shop: [], inventory: [],
        isCombat: false
    };

    function init() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        for (let y = 0; y < 6; y++) {
            for (let x = 0; x < 7; x++) {
                const cell = document.createElement('div');
                cell.className = `cell ${y < 3 ? 'enemy-zone' : ''}`;
                cell.id = `cell-${x}-${y}`;
                cell.ondragover = e => { e.preventDefault(); cell.classList.add('highlight'); };
                cell.ondragleave = () => cell.classList.remove('highlight');
                cell.ondrop = e => handleDrop(e, x, y);
                cell.onclick = () => useItemOnUnit(x, y);
                board.appendChild(cell);
            }
        }
        
        document.getElementById('sell-zone').ondragover = e => e.preventDefault();
        document.getElementById('sell-zone').ondrop = e => {
            const id = e.dataTransfer.getData('uid');
            const u = G.units.find(un => un.id == id);
            if (u) {
                G.units = G.units.filter(un => un.id != id);
                G.gold += 2; log("Đã bán quân! +2G");
                render(); updateUI();
            }
        };

        rollShop(true);
    }

    function rollShop(free = false) {
        if (!free && G.gold < 2) return;
        if (!free) G.gold -= 2;
        G.shop = [];
        const keys = Object.keys(CONFIG.TYPES);
        for(let i=0; i<5; i++) {
            const t = keys[Math.floor(Math.random()*7)];
            G.shop.push({ ...CONFIG.TYPES[t], type: t, id: Math.random() });
        }
        renderShop(); updateUI();
    }

    function renderShop() {
        const el = document.getElementById('shop');
        el.innerHTML = '';
        G.shop.forEach((item, i) => {
            const slot = document.createElement('div');
            slot.className = `shop-slot ${!item ? 'empty' : ''}`;
            if (item) {
                slot.innerHTML = `<b>${item.n}</b><small>${item.s}</small><div class="price">3G</div>`;
                slot.onclick = () => buyUnit(i);
            }
            el.appendChild(slot);
        });
    }

    function buyUnit(i) {
        const item = G.shop[i];
        if (!item || G.gold < 3 || G.isCombat) return;
        for (let x = 0; x < 7; x++) {
            if (!G.units.find(u => u.x === x && u.y === 5)) {
                G.gold -= 3;
                G.units.push({ ...item, x, y: 5, star: 1, curHp: item.hp, curMp: 0, items: '', stun:0, shield:0 });
                G.shop[i] = null;
                checkEvo(); renderShop(); render(); updateUI();
                return;
            }
        }
        log("Hàng chờ đã đầy!");
    }

    function checkEvo() {
        const groups = {};
        G.units.forEach(u => { const k = `${u.type}_${u.star}`; groups[k] = (groups[k] || []); groups[k].push(u); });
        for (let k in groups) {
            if (groups[k].length >= 3) {
                const f = groups[k][0];
                G.units = G.units.filter(u => !groups[k].slice(0, 3).includes(u));
                G.units.push({ ...CONFIG.TYPES[f.type], type: f.type, x: f.x, y: f.y, star: f.star+1, 
                    hp: f.hp*2.4, atk: f.atk*2.1, curHp: f.hp*2.4, curMp: 0, items: f.items, stun:0, shield:0, id: Math.random() });
                log("TIẾN HÓA CẤP SAO!");
                checkEvo();
            }
        }
    }

    function buyExp() {
        if (G.gold >= 4 && G.lvl < 8) {
            G.gold -= 4; G.exp += 4;
            if (G.exp >= G.lvl * 4) { G.exp = 0; G.lvl++; }
            updateUI();
        }
    }

    function handleDrop(e, x, y) {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
        const id = e.dataTransfer.getData('uid');
        const unit = G.units.find(u => u.id == id);
        if (unit && y >= 3) {
            const onBoard = G.units.filter(u => u.y < 5).length;
            if (unit.y === 5 && y < 5 && onBoard >= G.lvl) { log("Cần lên Cấp để thêm quân!"); return; }
            unit.x = x; unit.y = y;
            render(); updateUI();
        }
    }

    function useItemOnUnit(x, y) {
        if (G.inventory.length === 0 || G.isCombat) return;
        const unit = G.units.find(u => u.x === x && u.y === y);
        if (unit) {
            const item = G.inventory.shift();
            unit.atk += item.atk;
            unit.hp += item.hp; unit.curHp += item.hp;
            unit.items += item.i;
            log(`Đã lắp ${item.n} cho ${unit.n}!`);
            render(); updateUI();
        }
    }

    function render() {
        document.querySelectorAll('.unit').forEach(u => u.remove());
        [...G.units, ...G.enemies].forEach(u => {
            const cell = document.getElementById(`cell-${u.x}-${u.y}`);
            if (!cell) return;
            const el = document.createElement('div');
            el.className = `unit ${u.c} ${u.curMp >= u.mpM ? 'ult-ready' : ''}`;
            el.draggable = !G.isCombat;
            el.innerHTML = `<div class="unit-star">${'★'.repeat(u.star)}</div>${u.n}
                <div class="hp-bar"><div class="hp-fill" style="width:${(u.curHp/u.hp)*100}%; ${u.shield > 0 ? 'background:white' : ''}"></div></div>
                <div class="mp-bar"><div class="mp-fill" style="width:${(u.curMp/u.mpM)*100}%"></div></div>
                <div class="items-icons">${u.items}</div>`;
            el.ondragstart = e => e.dataTransfer.setData('uid', u.id);
            cell.appendChild(el);
        });
    }

    async function startCombat() {
        if (G.isCombat || G.units.filter(u => u.y < 5).length === 0) return;
        G.isCombat = true;
        document.getElementById('fight-btn').disabled = true;

        G.enemies = [];
        const count = Math.min(G.round + 1, 10);
        for(let i=0; i<count; i++){
            const t = Object.keys(CONFIG.TYPES)[Math.floor(Math.random()*7)];
            G.enemies.push({ ...CONFIG.TYPES[t], type: t, x: i%7, y: Math.floor(i/7), star: G.round > 5 ? 2 : 1, 
                hp: CONFIG.TYPES[t].hp * (1+G.round*0.2), atk: CONFIG.TYPES[t].atk * (1+G.round*0.1), 
                curHp: CONFIG.TYPES[t].hp * (1+G.round*0.2), curMp: 0, items: '', stun: 0, shield: 0, id: Math.random() });
        }
        render();

        while(G.units.filter(u=>u.y < 5).length > 0 && G.enemies.length > 0) {
            const syn = getSyn();
            
            G.units.filter(u=>u.y < 5).forEach(u => {
                if (u.stun > 0) { u.stun--; return; }
                const target = G.enemies[0]; if (!target) return;
                
                let d = u.atk * (syn.fire ? 1.4 : 1);
                dealDmg(u, target, d);
                if (syn.water) u.curHp = Math.min(u.hp, u.curHp + u.hp*0.05);
                
                u.curMp = Math.min(u.mpM, u.curMp + (syn.thunder ? 30 : 20));
                if (u.curMp >= u.mpM) castSkill(u, G.enemies, G.units.filter(u=>u.y<5));
            });

            G.enemies.forEach(e => {
                if (e.stun > 0) { e.stun--; return; }
                const targets = G.units.filter(u=>u.y < 5); if (targets.length === 0) return;
                const t = targets[Math.floor(Math.random()*targets.length)];
                
                let d = e.atk;
                if (syn.earth) d *= 0.7;
                dealDmg(e, t, d);
                e.curMp = Math.min(e.mpM, e.curMp + 20);
                if (e.curMp >= e.mpM) castSkill(e, G.units.filter(u=>u.y<5), G.enemies);
            });

            G.enemies = G.enemies.filter(e => e.curHp > 0);
            G.units = G.units.filter(u => u.y === 5 || u.curHp > 0);
            render();
            await new Promise(r => setTimeout(r, 500));
        }
        endCombat();
    }

    function getSyn() {
        const counts = {};
        G.units.filter(u=>u.y < 5).forEach(u => counts[u.type] = (counts[u.type] || 0) + 1);
        return {
            fire: counts.fire >= 3, water: counts.water >= 3,
            earth: counts.earth >= 3, thunder: counts.thunder >= 2
        };
    }

    function dealDmg(a, v, d) {
        if (v.shield > 0) { v.shield--; spawnVFX(v, "🛡️ Né", "white"); return; }
        v.curHp -= d; v.curMp = Math.min(v.mpM, v.curMp + 10);
        spawnVFX(v, `-${Math.floor(d)}`, "red");
    }

    function castSkill(u, enemies, allies) {
        u.curMp = 0;
        if (u.type === 'fire') { enemies[0].curHp -= u.atk * 2; log("BỘC PHÁ!"); }
        else if (u.type === 'water') { allies.forEach(a => a.curHp = Math.min(a.hp, a.curHp + 50)); log("HỒI XUÂN!"); }
        else if (u.type === 'earth') { u.shield = 2; log("THẠCH GIÁP!"); }
        else if (u.type === 'thunder') { enemies[0].stun = 2; log("TÊ LIỆT!"); }
        else if (u.type === 'dark') { u.curHp = Math.min(u.hp, u.curHp + u.atk); log("MA HÚT!"); }
        else { enemies[0].curHp -= u.atk; log("TẤN CÔNG!"); }
    }

    function spawnVFX(u, t, c) {
        const cell = document.getElementById(`cell-${u.x}-${u.y}`);
        if (!cell) return;
        const v = document.createElement('div'); v.className = 'vfx-text';
        v.style.color = c; v.innerText = t;
        cell.appendChild(v); setTimeout(() => v.remove(), 800);
    }

    function endCombat() {
        G.isCombat = false;
        document.getElementById('fight-btn').disabled = false;
        if (G.enemies.length === 0) {
            log("THẮNG! Nhận vật phẩm.");
            G.gold += 6 + Math.floor(G.gold * 0.1);
            G.inventory.push(CONFIG.ITEMS[Math.floor(Math.random()*3)]);
            G.round++;
        } else {
            const d = G.enemies.length * 10; G.hp -= d;
            log(`THUA! Mất ${d} HP`);
        }
        G.units.forEach(u => { u.curHp = u.hp; u.curMp = 0; u.stun = 0; u.shield = 0; });
        if (G.hp <= 0) { alert("GAME OVER!"); location.reload(); }
        updateUI(); rollShop(true); render();
    }

    function updateUI() {
        document.getElementById('gold').innerText = G.gold;
        document.getElementById('hp').innerText = G.hp;
        document.getElementById('lvl').innerText = G.lvl;
        document.getElementById('round').innerText = G.round;
        document.getElementById('pop').innerText = G.units.filter(u=>u.y < 5).length;
        document.getElementById('max-pop').innerText = G.lvl;
        document.getElementById('inventory-count').innerText = G.inventory.length;

        const counts = {};
        G.units.filter(u=>u.y < 5).forEach(u => counts[u.type] = (counts[u.type] || 0) + 1);
        const synEl = document.getElementById('synergies');
        synEl.innerHTML = '<b>TỘC HỆ:</b><br>';
        for(let s in CONFIG.SYNERGIES) {
            const active = (counts[s]||0) >= CONFIG.SYNERGIES[s].req;
            synEl.innerHTML += `<div class="syn-item ${active?'syn-active':''}">
                ${s.toUpperCase()} (${counts[s]||0}/${CONFIG.SYNERGIES[s].req})<br>${CONFIG.SYNERGIES[s].b}
            </div>`;
        }
    }

    function log(m) { document.getElementById('msg-log').innerText = m; }

    init();
</script>
</body>
</html>
